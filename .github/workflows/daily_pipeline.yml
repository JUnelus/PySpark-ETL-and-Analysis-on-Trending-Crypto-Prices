name: Daily Crypto ETL

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Set up Java for PySpark
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          MPLBACKEND: Agg
        run: |
          python pipeline.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data output artifacts
          if git diff --cached --quiet; then
            echo "No updates to commit"
          else
            git commit -m "chore: daily crypto ETL update"
            git push
          fi

      - name: Send failure notification email
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[FAILED] Daily Crypto ETL workflow - ${{ github.repository }}"
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: ${{ secrets.SMTP_FROM_EMAIL }}
          body: |
            The Daily Crypto ETL workflow failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Workflow: ${{ github.workflow }}
            Run number: ${{ github.run_number }}
            Commit: ${{ github.sha }}

            Run URL:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

